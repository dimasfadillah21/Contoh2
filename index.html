<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Siap Dibuka</title>

<style>
/* Style tetap sama seperti sebelumnya */
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial,Helvetica,sans-serif; }

body {
    height:100vh;
    background:linear-gradient(180deg,#08111f,#04070d);
    overflow:hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

.overlay, .card { /* Style overlay & card sama seperti kode sebelumnya */ }
/* ... (saya ringkas style-nya biar tidak terlalu panjang) ... */
</style>
</head>
<body>

<!-- Overlay & Card (sama seperti sebelumnya) -->
<div class="overlay" id="warningOverlay"> ... </div>
<div class="card" id="cardPage"> ... </div>

<script>
// GANTI LINK AFFILIATE
const affiliateLink = "https://shopee.co.id/affiliate-link-anda-disini";

let videoLinks = [];

// Load videos.txt - Versi lebih cepat untuk ribuan link
fetch('videos.txt')
    .then(r => r.text())
    .then(text => {
        videoLinks = text
            .split('\n')
            .map(line => line.trim())
            .filter(line => line && line.startsWith('http'));
        
        console.log(`✅ Total ${videoLinks.length} video berhasil dimuat`);
    })
    .catch(err => {
        console.error("Gagal load txt", err);
        videoLinks = ["https://cdn2.aceimg.com/qq6qUPdJu.mp4"];
    });

// Klik X
document.getElementById("affiliateLink").addEventListener("click", (e) => {
    e.preventDefault();
    window.open(affiliateLink, "_blank");
    document.getElementById("warningOverlay").style.display = "none";
    document.getElementById("cardPage").style.display = "block";
});

// Klik Tonton Sekarang
document.getElementById("btn").addEventListener("click", (e) => {
    e.preventDefault();
    
    const id = parseInt(new URLSearchParams(window.location.search).get("id")) || 1;
    const videoUrl = videoLinks[id - 1];

    if (videoUrl) {
        window.location.href = videoUrl;
    } else {
        alert(`Video nomor ${id} tidak ditemukan.\nTotal video tersedia: ${videoLinks.length}`);
    }
});
</script>

</body>
</html>
